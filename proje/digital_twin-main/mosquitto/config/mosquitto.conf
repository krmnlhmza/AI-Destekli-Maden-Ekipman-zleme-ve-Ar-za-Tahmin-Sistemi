# Mosquitto MQTT Broker — Maden Dijital İkiz
# Maden sahasındaki sensörlerin veri yayını için broker yapılandırması

listener 1883
protocol mqtt

# WebSocket (tarayıcı tabanlı izleme için)
listener 9001
protocol websockets

# Demo ortamı: kimlik doğrulama kapalı.
# Üretimde allow_anonymous false + password_file kullanılmalı.
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
